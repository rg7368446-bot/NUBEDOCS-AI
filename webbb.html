<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicación de Documentos - Notariado</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; padding: 20px; background-color: #f0f2f5; color: #333; margin: 0; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #0061ff; padding-bottom: 10px; }
        .documento { margin-bottom: 50px; padding: 20px; border: 1px solid #e1e4e8; border-radius: 10px; background-color: #fff; }
        .info { background: #f8f9fa; padding: 15px; border-left: 5px solid #0061ff; margin-bottom: 20px; border-radius: 4px; }
        .info p { margin: 5px 0; font-size: 1.1em; }
        .pdf-viewer { width: 100%; height: 600px; border: none; border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0061ff; margin-top: 0; }
        @media (max-width: 600px) {
            .pdf-viewer { height: 400px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">

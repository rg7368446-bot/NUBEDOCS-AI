<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Repositorio Notariado</title>
    <style>
        :root { --primary: #003366; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .upload-section { background: #eee; padding: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        .btn-view { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); text-align: center;">🎓 REPOSITORIO COMPARTIDO</h1>
    
    <div class="upload-section">
        <input type="text" id="fName" placeholder="Título PDF">
        <input type="text" id="fAuth" placeholder="Autor">
        <input type="text" id="fUrl" placeholder="Enlace (URL)">
        <input type="datetime-local" id="fDate">
        <button onclick="uploadToFirebase()" style="background: var(--primary); color:white;">SUBIR</button>
    </div>

    <table id="docTable">
        <thead>
            <tr>
                <th>Archivo</th>
                <th>Autor</th>
                <th>Fecha</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // 1. REEMPLAZA ESTO CON TUS DATOS DE FIREBASE
    const firebaseConfig = {
        aapiKey: "AIzaSyD8xoNpA7X7w3xX6abB3r-wKEVpZNb_rjo",
  authDomain: "notariado-8f7ab.firebaseapp.com",
  databaseURL: "https://notariado-8f7ab-default-rtdb.firebaseio.com/",
  projectId: "notariado-8f7ab",
  storageBucket: "notariado-8f7ab.firebasestorage.app",
  messagingSenderId: "333617528132",
  appId: "1:333617528132:web:8824bcecf2d8fee0f4eb11",
  measurementId: "G-N9DVM2FK15"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. DOCUMENTOS QUE DEBEN APARECER SIEMPRE AL INICIO
    const iniciales = [
        { name: "Ejemplos de actas Notariado Segundo Parcial.pdf", author: "Giovana Ramirez", date: "2026-04-06T10:00", url: "Ejemplos de actas Notariado Segundo Parcial.pdf" },
        { name: "Tarea Notariado Acta Notoriedad.pdf", author: "Jose Carlos", date: "2026-04-06T10:00", url: "https://dropbox.com" }
    ];

    // Verificar si ya existen en la nube; si no, subirlos
    db.ref('docs').once('value', (snap) => {
        if (!snap.exists()) {
            iniciales.forEach(d => db.ref('docs').push(d));
        }
    });

    // Función para mostrar en tiempo real
    db.ref('docs').on('value', (snap) => {
        const tbody = document.getElementById('list');
        tbody.innerHTML = "";
        snap.forEach((child) => {
            const d = child.val();
            tbody.innerHTML += `<tr>
                <td>📄 ${d.name}</td>
                <td>${d.author}</td>
                <td>${d.date.replace('T', ' ')}</td>
                <td><button class="btn-view" onclick="window.open('${d.url}')">Ver</button></td>
            </tr>`;
        });
    });

    function uploadToFirebase() {
        const name = document.getElementById('fName').value;
        const author = document.getElementById('fAuth').value;
        const url = document.getElementById('fUrl').value;
        const date = document.getElementById('fDate').value;
        if(name && author && url && date) {
            db.ref('docs').push({ name, author, url, date });
        }
    }
</script>
</body>
</html>
